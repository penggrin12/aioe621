name: "Publish release to PyPI"

on:
  push:
    tags:
      - v*

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
      - name: Install Python 3.10
        run: uv python install 3.10
      - name: Build
        run: uv build
      - name: Unittest (wheel)
        run: uv run --isolated --no-project --with dist/*.whl python -m unittest tests.test
      - name: Unittest (source distribution)
        run: uv run --isolated --no-project --with dist/*.tar.gz python -m unittest tests.test
      - name: Publish
        run: uv publish